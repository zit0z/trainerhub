<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — SweetCheat</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared-modern.css">
    <style>
        .leaderboard { max-width:700px; margin:0 auto; }
        .lb-row { display:flex; align-items:center; gap:16px; padding:14px 18px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; transition:all .2s; }
        .lb-row:hover { border-color:var(--accent); }
        .lb-rank { width:40px; text-align:center; font-family:'Rajdhani',sans-serif; font-size:1.4rem; font-weight:700; color:var(--accent); }
        .lb-user { flex:1; font-weight:600; }
        .lb-score { font-family:'Rajdhani',sans-serif; font-weight:700; color:var(--text-muted); }
        .lb-tabs { display:flex; gap:10px; margin-bottom:24px; }
    </style>
</head>
<body>
    <header style="background:var(--bg-card); border-bottom:1px solid var(--border); padding:14px 20px;">
        <div style="max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
            <a href="/trainerhub/" class="brand"><i class="fas fa-crosshairs"></i>Sweet<span>Cheat</span></a>
            <a href="dashboard" class="btn btn-primary btn-sm">Dashboard</a>
        </div>
    </header>

    <div style="max-width:1000px; margin:0 auto; padding:40px 20px;">
        <h1 style="font-family:'Rajdhani',sans-serif; font-size:2.2rem; margin-bottom:8px;">Rangliste</h1>
        <p style="color:var(--text-muted); margin-bottom:24px;">Wetteifere mit der Community.</p>

        <div class="lb-tabs">
            <button class="btn btn-secondary btn-sm" onclick="loadBoard('activations')">Aktivierungen</button>
            <button class="btn btn-secondary btn-sm" onclick="loadBoard('challenges')">Challenges</button>
            <button class="btn btn-secondary btn-sm" onclick="loadBoard('reputation')">Reputation</button>
        </div>

        <div id="leaderboard" class="leaderboard">Lade...</div>
    </div>

    <footer style="background:var(--bg-card); border-top:1px solid var(--border); padding:30px; text-align:center; color:var(--text-muted); font-size:14px;">
        <p>© 2026 SweetCheat.</p>
    </footer>

    <script src="shared.js"></script>
    <script>
        async function loadBoard(type) {
            try {
                const res = await fetch('api/leaderboard.php?type=' + type);
                const data = await res.json();
                const container = document.getElementById('leaderboard');
                if (!data.success || !data.leaderboard.length) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:40px;">Noch keine Daten.</div>';
                    return;
                }
                container.innerHTML = data.leaderboard.map(row => `
                    <div class="lb-row">
                        <div class="lb-rank">#${row.rank}</div>
                        <div class="lb-user">${escapeHtml(row.display)}</div>
                        <div class="lb-score">${row.score} Punkte</div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text || ''; return div.innerHTML; }
        loadBoard('activations');
    </script>
</body>
</html>
