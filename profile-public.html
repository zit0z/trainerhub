<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Profil — SweetCheat</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared-modern.css">
    <style>
        .profile-hero { background:linear-gradient(135deg, rgba(0,240,255,0.08), transparent); border-bottom:1px solid var(--border); padding:60px 20px; }
        .profile-card { max-width:700px; margin:0 auto; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:40px; text-align:center; }
        .avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, var(--accent), #8b5cf6); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-family:'Rajdhani',sans-serif; font-size:2.5rem; font-weight:700; color:#0a0a0f; }
        .stat-row { display:flex; justify-content:center; gap:40px; margin-top:30px; }
        .stat { text-align:center; }
        .stat-value { font-family:'Rajdhani',sans-serif; font-size:2rem; font-weight:700; color:var(--accent); }
        .stat-label { font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
    </style>
</head>
<body>
    <header style="background:var(--bg-card); border-bottom:1px solid var(--border); padding:14px 20px;">
        <div style="max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
            <a href="/trainerhub/" class="brand"><i class="fas fa-crosshairs"></i>Sweet<span>Cheat</span></a>
            <a href="leaderboard" class="btn btn-secondary btn-sm">Zur Rangliste</a>
        </div>
    </header>

    <div class="profile-hero">
        <div class="profile-card" id="profileCard">
            <div class="shimmer" style="width:100px; height:100px; border-radius:50%; margin:0 auto 20px;"></div>
            <div class="shimmer" style="height:24px; width:200px; margin:0 auto;"></div>
        </div>
    </div>

    <footer style="background:var(--bg-card); border-top:1px solid var(--border); padding:30px; text-align:center; color:var(--text-muted); font-size:14px;">
        <p>© 2026 SweetCheat.</p>
    </footer>

    <script src="shared.js"></script>
    <script>
        async function loadProfile() {
            const user = location.pathname.split('/').pop();
            try {
                const res = await fetch('api/profile.php?action=public&user=' + encodeURIComponent(user));
                const data = await res.json();
                const card = document.getElementById('profileCard');
                if (!data.success || !data.profile) {
                    card.innerHTML = '<h2>Profil nicht gefunden</h2>';
                    return;
                }
                const p = data.profile;
                const initial = (p.username || 'U').charAt(0).toUpperCase();
                document.getElementById('pageTitle').textContent = (p.username || 'Profil') + ' — SweetCheat';
                card.innerHTML = `
                    <div class="avatar">${initial}</div>
                    <h1 style="font-family:'Rajdhani',sans-serif; margin-bottom:8px;">${escapeHtml(p.username || 'Anonym')}</h1>
                    <p style="color:var(--text-muted);">Mitglied seit ${new Date(p.created_at * 1000).toLocaleDateString('de-DE')}</p>
                    <div class="stat-row">
                        <div class="stat"><div class="stat-value">${p.activations || 0}</div><div class="stat-label">Aktivierungen</div></div>
                        <div class="stat"><div class="stat-value">${p.favorites || 0}</div><div class="stat-label">Favoriten</div></div>
                        <div class="stat"><div class="stat-value">${p.reputation || 0}</div><div class="stat-label">Reputation</div></div>
                        <div class="stat"><div class="stat-value">${p.followers || 0}</div><div class="stat-label">Follower</div></div>
                    </div>
                `;
            } catch(e) { console.error(e); }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text || ''; return div.innerHTML; }
        loadProfile();
    </script>
</body>
</html>
