<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Spiele — SweetCheat</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared-modern.css">
    <style>
        
        .games-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:18px; }
        .game-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:transform .2s, box-shadow .2s, border-color .2s; position:relative; cursor:pointer; }
        .game-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 12px 40px rgba(0,240,255,0.12); }
        .game-cover { height:140px; background:linear-gradient(135deg, rgba(0,240,255,0.12), rgba(0,168,255,0.08)); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:3rem; position:relative; }
        .game-card-body { padding:18px; }
        .game-title { font-family:'Rajdhani',sans-serif; font-weight:600; font-size:1.25rem; color:var(--text); margin-bottom:6px; }
        .game-meta { font-size:13px; color:var(--text-muted); display:flex; gap:12px; align-items:center; }
        .favorite-btn { position:absolute; top:10px; right:10px; width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; z-index:2; }
        .favorite-btn:hover { background:rgba(0,0,0,0.8); color:#ffd700; transform:scale(1.1); }
        .favorite-btn.active { color:#ffd700; background:rgba(255,215,0,0.15); border-color:rgba(255,215,0,0.4); }
        .trainer-badge { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.6); color:#fff; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; padding:20px; }
        .overlay.open { display:flex; }
        .overlay-content { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:720px; max-height:90vh; overflow:auto; padding:28px; position:relative; }
        .close-overlay { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-muted); font-size:1.4rem; cursor:pointer; }
        .trainer-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
        .trainer-row:last-child { border-bottom:none; }
        .trainer-lock { color:#ff3864; margin-left:8px; font-size:12px; }
        .activation-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:101; align-items:center; justify-content:center; padding:20px; }
        .activation-modal.open { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--accent); border-radius:var(--radius); max-width:480px; width:100%; padding:28px; text-align:center; }
        @media (max-width:640px) { .games-grid { grid-template-columns:1fr; } }

    </style>
</head>

<body>
    <button class="mobile-toggle" onclick="toggleMobileNav()" aria-label="Menü"><i class="fas fa-bars"></i></button>
    <aside class="nav-sidebar">
        <div class="nav-main">
            <div style="padding:0 8px 24px;">
                <a href="/trainerhub/" class="brand" style="font-size:1.6rem;"><i class="fas fa-crosshairs"></i>Sweet<span>Cheat</span></a>
            </div>
            <a href="dashboard" class="nav-item" id="navDashboard"><span class="icon"><i class="fas fa-home"></i></span> Dashboard</a>
            <a href="games" class="nav-item" id="navGames"><span class="icon"><i class="fas fa-gamepad"></i></span> Meine Spiele</a>
            <a href="favorites" class="nav-item" id="navFavorites"><span class="icon"><i class="fas fa-star"></i></span> Favoriten</a>
            <a href="settings" class="nav-item" id="navSettings"><span class="icon"><i class="fas fa-cog"></i></span> Einstellungen</a>
            <a href="profile" class="nav-item" id="navProfile"><span class="icon"><i class="fas fa-user-circle"></i></span> Profil</a>
            <a href="logout" class="nav-item" id="navLogout"><span class="icon"><i class="fas fa-sign-out-alt"></i></span> Logout</a>
        </div>
        <div style="padding:18px; border-top:1px solid var(--border);">
            <div id="userMini" style="display:flex; align-items:center; gap:12px;">
                <div style="width:38px;height:38px;border-radius:999px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;color:var(--accent);"><i class="fas fa-user"></i></div>
                <div>
                    <div id="userName" style="font-weight:600;font-size:14px;">Gast</div>
                    <div id="userSub" class="badge badge-free">Free</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="page-content">
        <div class="topbar">
            <h1 class="section-title" style="font-size:26px;">Meine Spiele</h1>
            <div style="position:relative; flex:1; max-width:360px;">
                <input type="text" id="globalSearch" placeholder="Spiele/Trainer suchen... (Ctrl+K)" oninput="globalSearch(this)" autocomplete="off" style="width:100%;">
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="toggleTheme()" title="Theme wechseln" style="width:38px; height:38px; padding:0;"><i class="fas fa-moon" id="themeIcon"></i></button>
            <div style="display:flex; gap:12px; align-items:center;">
                <span id="versionBadge" class="badge badge-free">v0.8.1</span>
                <a href="setup" class="btn btn-primary btn-sm"><i class="fas fa-download"></i> App downloaden</a>
            </div>
        </div>

        <div style="padding:28px;">
            <p class="section-subtitle">Durchsuche alle verfügbaren Spiele und markiere deine Favoriten.</p>
            <div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
                <input type="text" id="gameSearch" placeholder="Spiel suchen..." oninput="filterGames()">
                <select id="genreFilter" onchange="filterGames()">
                    <option value="">Alle Genres</option>
                    <option value="RPG">RPG</option>
                    <option value="Action">Action</option>
                    <option value="Shooter">Shooter</option>
                    <option value="Strategy">Strategy</option>
                    <option value="Simulation">Simulation</option>
                    <option value="Puzzle">Puzzle</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div id="gamesGrid" class="games-grid">
                <div class="card shimmer" style="height:220px;"></div>
                <div class="card shimmer" style="height:220px;"></div>
                <div class="card shimmer" style="height:220px;"></div>
            </div>
        </div>

        <div id="gameOverlay" class="overlay">
            <div class="overlay-content">
                <button class="close-overlay" onclick="closeOverlay()"><i class="fas fa-times"></i></button>
                <div id="overlayBody">...</div>
            </div>
        </div>

    </div>
    <script src="shared.js"></script>
    <script>
        document.getElementById('navGames').classList.add('active');
        document.getElementById('navLogout').addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sweetcheat_api_key'); location.href='login'; });
        const savedTheme = localStorage.getItem('sweetcheat_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        document.addEventListener('click', e => {
            const dd = document.getElementById('searchDropdown');
            if (dd && !e.target.closest('#globalSearch') && !e.target.closest('#searchDropdown')) dd.classList.remove('open');
        });
        
    </script>
    <script>
        let allGames = [];
        const key = localStorage.getItem('sweetcheat_api_key');
        if (!key) location.href = 'login';

        async function loadUser() {
            const res = await fetch('api/billing.php?action=status', {headers:{'Authorization':'Bearer '+key}});
            const data = await res.json();
            if (data.success) {
                document.getElementById('userName').textContent = data.user?.username || data.email?.split('@')[0] || 'User';
                document.getElementById('userSub').textContent = (data.subscription || 'free').toUpperCase();
            }
        }

        async function loadGames() {
            const res = await fetch('api/games.php?per_page=100', {headers:{'Authorization':'Bearer '+key}});
            const data = await res.json();
            if (data.success) {
                allGames = data.games;
                renderGames(allGames);
            }
        }

        function renderGames(games) {
            const grid = document.getElementById('gamesGrid');
            if (!games.length) { grid.innerHTML = '<div class="card" style="padding:32px; text-align:center; color:var(--text-muted); grid-column:1/-1;">Keine Spiele gefunden.</div>'; return; }
            grid.innerHTML = games.map(g => `
                <div class="game-card" onclick="openGame('${g.slug}')">
                    <div class="game-cover">
                        <i class="fas ${g.cover_url || 'fa-gamepad'}"></i>
                        <span class="trainer-badge">${g.trainer_count || 0} Trainer</span>
                    </div>
                    <button class="favorite-btn ${g.is_favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleGameFavorite(${g.id}, this)" title="Favorit">
                        <i class="fas fa-star"></i>
                    </button>
                    <div class="game-card-body">
                        <div class="game-title">${escapeHtml(g.name)}</div>
                        <div class="game-meta">
                            <span><i class="fas fa-tag"></i> ${escapeHtml(g.genre || 'Unknown')}</span>
                            <span><i class="fas fa-calendar"></i> ${g.release_year || '-'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleGameFavorite(gameId, btn) {
            const active = btn.classList.contains('active');
            const res = await fetch('api/favorites.php', {
                method: active ? 'DELETE' : 'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+key},
                body: JSON.stringify({game_id: gameId})
            });
            const data = await res.json();
            if (data.success) {
                btn.classList.toggle('active');
                const idx = allGames.findIndex(g => g.id == gameId);
                if (idx >=0) allGames[idx].is_favorite = active ? 0 : 1;
                showToast(active ? 'Aus Favoriten entfernt' : 'Zu Favoriten hinzugefügt', active ? 'info' : 'success', 1800);
            }
        }

        async function openGame(slug) {
            const [gameRes, trainerRes] = await Promise.all([
                fetch('api/games.php?game='+encodeURIComponent(slug), {headers:{'Authorization':'Bearer '+key}}),
                fetch('api/trainers.php?game='+encodeURIComponent(slug), {headers:{'Authorization':'Bearer '+key}})
            ]);
            const gameData = await gameRes.json();
            const trainerData = await trainerRes.json();
            const game = gameData.games?.[0] || {};
            const trainers = trainerData.trainers || [];
            document.getElementById('overlayBody').innerHTML = `
                <div class="game-cover" style="height:180px; margin-bottom:20px; border-radius:var(--radius);">
                    <i class="fas ${game.cover_url || 'fa-gamepad'}"></i>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;">
                    <div>
                        <h2 style="font-family:'Rajdhani',sans-serif; margin:0;">${escapeHtml(game.name)}</h2>
                        <div style="color:var(--text-muted); font-size:14px; margin-top:4px;">${escapeHtml(game.genre || 'Unknown')} • ${game.release_year || '-'} • ${game.trainer_count || 0} Trainer</div>
                    </div>
                    <button class="favorite-btn ${game.is_favorite ? 'active' : ''}" onclick="toggleGameFavorite(${game.id}, this)" title="Favorit"><i class="fas fa-star"></i></button>
                </div>
                <p style="color:var(--text-muted); line-height:1.6;">${escapeHtml(game.description || 'Beschreibung folgt.')}</p>
                <div style="display:flex; gap:10px; margin:16px 0;">
                    <a href="trainers?game=${game.slug}" class="btn btn-primary"><i class="fas fa-bolt"></i> Alle Trainer</a>
                </div>
                <h3 style="font-family:'Rajdhani',sans-serif; text-transform:uppercase; margin:24px 0 12px;">Verfügbare Trainer</h3>
                <div>${trainers.length ? trainers.map(t => `
                    <div class="trainer-row">
                        <div>
                            <div style="font-weight:600;">${escapeHtml(t.name)} ${t.premium ? '<span class="trainer-lock">PREMIUM</span>' : ''}</div>
                            <div style="font-size:13px; color:var(--text-muted);">${escapeHtml(t.description || '')}</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn btn-secondary btn-sm" onclick="toggleTrainerFavorite(${t.trainer_id}, this)" title="Favorit">
                                <i class="fas fa-star ${t.is_favorite ? 'active' : ''}" style="color:${t.is_favorite ? '#ffd700' : 'var(--text-muted)'}"></i>
                            </button>
                            <a href="trainers?game=${game.slug}&trainer=${t.trainer_id}" class="btn btn-primary btn-sm">Aktivieren</a>
                        </div>
                    </div>
                `).join('') : '<div style="color:var(--text-muted); padding:12px 0;">Keine Trainer verfügbar.</div>'}</div>
            `;
            document.getElementById('gameOverlay').classList.add('open');
        }

        async function toggleTrainerFavorite(trainerId, btn) {
            const icon = btn.querySelector('i');
            const active = icon.classList.contains('active');
            const res = await fetch('api/favorites.php', {
                method: active ? 'DELETE' : 'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+key},
                body: JSON.stringify({trainer_id: trainerId})
            });
            const data = await res.json();
            if (data.success) {
                icon.style.color = active ? 'var(--text-muted)' : '#ffd700';
                icon.classList.toggle('active');
                showToast(active ? 'Trainer entfernt' : 'Trainer favorisiert', active ? 'info' : 'success', 1800);
            }
        }

        function closeOverlay() { document.getElementById('gameOverlay').classList.remove('open'); }
        document.getElementById('gameOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeOverlay(); });

        function filterGames() {
            const q = document.getElementById('gameSearch').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            renderGames(allGames.filter(g => (!q || (g.name||'').toLowerCase().includes(q)) && (!genre || (g.genre||'') === genre)));
        }

        loadUser();
        loadGames();
</script>

<!-- Support Widget -->
<div id="supportWidget" style="position:fixed; bottom:24px; right:24px; z-index:999;">
    <button id="supportToggle" onclick="toggleSupport()" style="width:56px; height:56px; border-radius:50%; background:var(--accent); color:var(--bg); border:none; font-size:1.4rem; cursor:pointer; box-shadow:0 8px 32px rgba(0,240,255,0.3); transition:transform .2s;"><i class="fas fa-comment-dots"></i></button>
    <div id="supportPanel" style="display:none; position:absolute; bottom:70px; right:0; width:320px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:0 16px 48px rgba(0,0,0,0.4);">
        <h4 style="margin:0 0 12px; font-family:'Rajdhani',sans-serif; text-transform:uppercase;">Support</h4>
        <div id="supportForm">
            <input type="email" id="supportEmail" placeholder="Deine E-Mail" style="margin-bottom:10px; width:100%;">
            <input type="text" id="supportSubject" placeholder="Betreff" style="margin-bottom:10px; width:100%;">
            <textarea id="supportMessage" placeholder="Wie können wir dir helfen?" rows="4" style="margin-bottom:10px; width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px;"></textarea>
            <button class="btn btn-primary" onclick="sendSupport()" style="width:100%;">Absenden</button>
        </div>
        <div id="supportSuccess" style="display:none; text-align:center; color:var(--success); padding:20px 0;">
            <i class="fas fa-check-circle" style="font-size:2rem;"></i>
            <p>Ticket erstellt. Wir melden uns per E-Mail.</p>
        </div>
    </div>
</div>

<script>
function toggleSupport() {
    const panel = document.getElementById('supportPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function sendSupport() {
    const btn = document.querySelector('#supportForm button');
    const email = document.getElementById('supportEmail').value.trim();
    const subject = document.getElementById('supportSubject').value.trim();
    const message = document.getElementById('supportMessage').value.trim();
    if (!email || !subject || !message) {
        if (typeof showToast === 'function') showToast('Bitte alle Felder ausfüllen', 'error');
        else alert('Bitte alle Felder ausfüllen');
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        const res = await fetch('api/support.php', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, subject, message})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('supportForm').style.display = 'none';
            document.getElementById('supportSuccess').style.display = 'block';
        } else {
            if (typeof showToast === 'function') showToast(data.error || 'Fehler', 'error');
            else alert(data.error || 'Fehler');
            btn.disabled = false;
            btn.textContent = 'Absenden';
        }
    } catch(e) {
        if (typeof showToast === 'function') showToast('Netzwerkfehler', 'error');
        else alert('Netzwerkfehler');
        btn.disabled = false;
    }
}

document.addEventListener('click', function(e) {
    const widget = document.getElementById('supportWidget');
    if (widget && !widget.contains(e.target)) {
        const panel = document.getElementById('supportPanel');
        if (panel) panel.style.display = 'none';
    }
});

</script>
</body>
</html>
