name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller==5.13.2 pymem pywin32 pywin32-ctypes

    - name: Build EXE
      run: |
        python -m PyInstaller TrainerHub.spec --clean --noconfirm
        Get-ChildItem dist\TrainerHub\TrainerHub.exe
        $size = [math]::Round((Get-Item dist\TrainerHub\TrainerHub.exe).Length / 1MB, 2)
        Write-Host "EXE size: $size MB"

    - name: Package as ZIP
      run: |
        Compress-Archive -Path dist\TrainerHub\* -DestinationPath TrainerHub-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrainerHub-windows
        path: TrainerHub-windows.zip
        retention-days: 90
