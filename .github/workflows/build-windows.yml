name: Build Windows EXE + Inno Setup Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller==5.13.2 pymem pywin32 pywin32-ctypes

    - name: Build EXE
      run: |
        python -m PyInstaller TrainerHub.spec --clean --noconfirm
        Get-ChildItem dist\TrainerHub\TrainerHub.exe
        $size = [math]::Round((Get-Item dist\TrainerHub\TrainerHub.exe).Length / 1MB, 2)
        Write-Host "EXE size: $size MB"

    - name: Trim unused Tcl/Tk files
      run: |
        $tcl = "dist\TrainerHub\tcl"
        $tk = "dist\TrainerHub\tk"
        if (Test-Path $tcl) {
          Remove-Item -Path "$tcl\tzdata" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$tcl\encoding" -Recurse -Force -ErrorAction SilentlyContinue
        }
        if (Test-Path $tk) {
          Remove-Item -Path "$tk\demos" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$tk\images" -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Generate SHA256 manifest
      run: |
        $lines = @()
        Get-ChildItem -Path dist\TrainerHub -Recurse -File | ForEach-Object {
          $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
          $rel = $_.FullName.Substring((Resolve-Path dist\TrainerHub).Path.Length + 1)
          $lines += "$hash  $rel"
        }
        $lines | Out-File -FilePath dist\TrainerHub\SHA256SUMS.txt -Encoding utf8
        Get-ChildItem dist\TrainerHub\SHA256SUMS.txt

    - name: Self-sign EXE (optional, improves SmartScreen over time)
      run: |
        $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=TrainerHub" -KeyUsage DigitalSignature -FriendlyName "TrainerHub Self-Sign" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(5)
        $pwd = ConvertTo-SecureString -String "TrainerHub2026" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath trainerhub-sign.pfx -Password $pwd
        signtool.exe sign /f trainerhub-sign.pfx /p TrainerHub2026 /t http://timestamp.digicert.com /fd SHA256 /a "dist\TrainerHub\TrainerHub.exe"
        signtool.exe verify /pa "dist\TrainerHub\TrainerHub.exe" || Write-Host "Self-sign verification optional"
      continue-on-error: true

    - name: Package as ZIP
      run: |
        Compress-Archive -Path dist\TrainerHub\* -DestinationPath TrainerHub-windows.zip

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Build Installer
      run: |
        & "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" TrainerHub.iss
        signtool.exe sign /f trainerhub-sign.pfx /p TrainerHub2026 /t http://timestamp.digicert.com /fd SHA256 /a TrainerHub-Setup.exe
        Get-ChildItem TrainerHub-Setup.exe
        $size = [math]::Round((Get-Item TrainerHub-Setup.exe).Length / 1MB, 2)
        Write-Host "Setup size: $size MB"
      continue-on-error: true

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrainerHub-windows
        path: TrainerHub-windows.zip
        retention-days: 90

    - name: Upload Installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrainerHub-Setup
        path: TrainerHub-Setup.exe
        retention-days: 90

    - name: Update server version file
      if: github.ref == 'refs/heads/main'
      shell: powershell
      run: |
        $ver = Get-Content -Path version.txt -TotalCount 1 -ErrorAction SilentlyContinue
        if (-not $ver) { $ver = "0.5.3" }
        Write-Host "Built version: $ver"
