<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer — SweetCheat</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared-modern.css">
    <style>
        
        .trainer-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; transition:all .2s; }
        .trainer-card:hover { border-color:var(--accent); }
        .trainer-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
        .trainer-title { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:600; }
        .trainer-desc { color:var(--text-muted); font-size:14px; line-height:1.5; margin-bottom:14px; }
        .trainer-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .activation-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:101; align-items:center; justify-content:center; padding:20px; }
        .activation-modal.open { display:flex; }
        .modal-box { background:var(--bg-card); border:1px solid var(--accent); border-radius:var(--radius); max-width:480px; width:100%; padding:28px; text-align:center; }
        .favorite-star { background:none; border:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer; transition:color .2s; }
        .favorite-star.active { color:#ffd700; }
        .favorite-star:hover { color:#ffd700; }

    </style>
</head>

<body>
    <button class="mobile-toggle" onclick="toggleMobileNav()" aria-label="Menü"><i class="fas fa-bars"></i></button>
    <aside class="nav-sidebar">
        <div class="nav-main">

            <a href="dashboard" class="nav-item active"><span class="icon"><i class="fas fa-th-large"></i></span> Dashboard</a>
            <a href="games" class="nav-item"><span class="icon"><i class="fas fa-gamepad"></i></span> Spiele</a>
            <a href="trainers" class="nav-item"><span class="icon"><i class="fas fa-crosshairs"></i></span> Trainer</a>
            <a href="favorites" class="nav-item"><span class="icon"><i class="fas fa-star"></i></span> Favoriten</a>
            <a href="challenges" class="nav-item"><span class="icon"><i class="fas fa-trophy"></i></span> Challenges</a>
            <a href="leaderboard" class="nav-item"><span class="icon"><i class="fas fa-chart-bar"></i></span> Rangliste</a>
            <a href="inbox" class="nav-item"><span class="icon"><i class="fas fa-bell"></i></span> Benachrichtigungen</a>
            <a href="blog" class="nav-item"><span class="icon"><i class="fas fa-newspaper"></i></span> Blog</a>
            <a href="profile" class="nav-item"><span class="icon"><i class="fas fa-user"></i></span> Profil</a>
            <a href="settings" class="nav-item"><span class="icon"><i class="fas fa-cog"></i></span> Einstellungen</a>

            </div>
        <div style="padding:18px; border-top:1px solid var(--border);">
            <div id="userMini" style="display:flex; align-items:center; gap:12px;">
                <div style="width:38px;height:38px;border-radius:999px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;color:var(--accent);"><i class="fas fa-user"></i></div>
                <div>
                    <div id="userName" style="font-weight:600;font-size:14px;">Gast</div>
                    <div id="userSub" class="badge badge-free">Free</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="page-content">
        <div class="topbar">
            <h1 class="section-title" style="font-size:26px;">Trainer</h1>
            <div style="position:relative; flex:1; max-width:360px;">
                <input type="text" id="globalSearch" placeholder="Spiele/Trainer suchen... (Ctrl+K)" oninput="globalSearch(this)" autocomplete="off" style="width:100%;">
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="toggleTheme()" title="Theme wechseln" style="width:38px; height:38px; padding:0;"><i class="fas fa-moon" id="themeIcon"></i></button>
            <div style="display:flex; gap:12px; align-items:center;">
                <span id="versionBadge" class="badge badge-free">v0.8.2</span>
                <a href="setup" class="btn btn-primary btn-sm"><i class="fas fa-download"></i> App downloaden</a>
            </div>
        </div>

        <div style="padding:28px;">
            <p class="section-subtitle" id="gameSubtitle">Lade Trainer...</p>
            <div id="trainersList">
                <div class="card shimmer" style="height:120px;"></div>
                <div class="card shimmer" style="height:120px;"></div>
            </div>
        </div>

        <div id="activationModal" class="activation-modal">
            <div class="modal-box">
                <div style="font-size:3rem; color:var(--accent); margin-bottom:12px;"><i class="fas fa-bolt"></i></div>
                <h2 id="modalTitle" style="font-family:'Rajdhani',sans-serif; margin:0 0 8px;">Aktivierung</h2>
                <p id="modalText" style="color:var(--text-muted);">Trainer wird aktiviert...</p>
                <div id="modalSpinner" style="margin:20px auto; width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
                <button class="btn btn-primary" onclick="closeModal()" style="margin-top:16px;">Schließen</button>
            </div>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    </div>
    <script src="shared.js"></script>
    <script>
        document.getElementById('navGames').classList.add('active');
        document.getElementById('navLogout').addEventListener('click', function(e) { e.preventDefault(); localStorage.removeItem('sweetcheat_api_key'); location.href='login'; });
        const savedTheme = localStorage.getItem('sweetcheat_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        document.addEventListener('click', e => {
            const dd = document.getElementById('searchDropdown');
            if (dd && !e.target.closest('#globalSearch') && !e.target.closest('#searchDropdown')) dd.classList.remove('open');
        });
        
    </script>
    <script>
        const key = localStorage.getItem('sweetcheat_api_key');
        if (!key) location.href = 'login';
        const urlParams = new URLSearchParams(window.location.search);
        const gameSlug = urlParams.get('game') || 'stardew-valley';
        let currentTrainers = [];

        async function loadUser() {
            const res = await fetch('api/billing.php?action=status', {headers:{'Authorization':'Bearer '+key}});
            const data = await res.json();
            if (data.success) {
                document.getElementById('userName').textContent = data.user?.username || data.email?.split('@')[0] || 'User';
                document.getElementById('userSub').textContent = (data.subscription || 'free').toUpperCase();
            }
        }

        async function loadTrainers() {
            const [gameRes, trainerRes] = await Promise.all([
                fetch('api/games.php?game='+encodeURIComponent(gameSlug), {headers:{'Authorization':'Bearer '+key}}),
                fetch('api/trainers.php?game='+encodeURIComponent(gameSlug), {headers:{'Authorization':'Bearer '+key}})
            ]);
            const gameData = await gameRes.json();
            const trainerData = await trainerRes.json();
            const game = gameData.games?.[0] || {name: gameSlug};
            currentTrainers = trainerData.trainers || [];
            document.querySelector('.section-title').textContent = escapeHtml(game.name);
            document.getElementById('gameSubtitle').textContent = `${currentTrainers.length} Trainer verfügbar • ${game.genre || 'Game'}`;
            renderTrainers(currentTrainers, game);
        }

        function renderTrainers(trainers, game) {
            const list = document.getElementById('trainersList');
            if (!trainers.length) {
                list.innerHTML = '<div class="card" style="padding:32px; text-align:center; color:var(--text-muted);">Keine Trainer für dieses Spiel.</div>';
                return;
            }
            list.innerHTML = trainers.map(t => `
                <div class="trainer-card">
                    <div class="trainer-header">
                        <div class="trainer-title">${escapeHtml(t.name)} ${t.premium ? '<span style="color:#ff3864; font-size:12px;">PREMIUM</span>' : ''}</div>
                        <button class="favorite-star ${t.is_favorite ? 'active' : ''}" onclick="toggleTrainerFav(${t.trainer_id}, this)" title="Favorit"><i class="fas fa-star"></i></button>
                    </div>
                    <div class="trainer-desc">${escapeHtml(t.description || 'Keine Beschreibung verfügbar.')}</div>
                    <div class="trainer-actions">
                        <button class="btn btn-primary" onclick="activateTrainer(${t.trainer_id}, '${escapeHtml(t.name)}', ${t.premium ? 'true' : 'false'})"><i class="fas fa-bolt"></i> Aktivieren</button>
                        <button class="btn btn-secondary btn-sm" onclick="copyCommand('${escapeHtml(t.command || '')}')" ${t.command ? '' : 'disabled'}><i class="fas fa-copy"></i> Befehl kopieren</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleTrainerFav(trainerId, btn) {
            const active = btn.classList.contains('active');
            const res = await fetch('api/favorites.php', {
                method: active ? 'DELETE' : 'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+key},
                body: JSON.stringify({trainer_id: trainerId})
            });
            const data = await res.json();
            if (data.success) {
                btn.classList.toggle('active');
                showToast(active ? 'Trainer entfernt' : 'Trainer favorisiert', active ? 'info' : 'success', 1800);
            }
        }

        function activateTrainer(id, name, isPremium) {
            const modal = document.getElementById('activationModal');
            document.getElementById('modalTitle').textContent = 'Aktivierung: ' + name;
            document.getElementById('modalText').textContent = isPremium ? 'Premium-Feature wird aktiviert...' : 'Trainer wird aktiviert...';
            document.getElementById('modalSpinner').style.display = 'block';
            modal.classList.add('open');
            setTimeout(() => {
                document.getElementById('modalSpinner').style.display = 'none';
                document.getElementById('modalText').innerHTML = '<span style="color:var(--success);"><i class="fas fa-check"></i> Aktiviert!</span><br><small style="color:var(--text-muted);">Starte dafür die SweetCheat Desktop-App.</small>';
                logActivation(id, 1);
            }, 1200);
        }

        async function logActivation(trainerId, success) {
            try {
                await fetch('api/trainer-logs.php?action=add', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+key},
                    body: JSON.stringify({trainer_id: trainerId, action:'activate', success: success})
                });
            } catch(e) {}
        }

        function closeModal() { document.getElementById('activationModal').classList.remove('open'); }
        function copyCommand(cmd) { if (!cmd) return; navigator.clipboard.writeText(cmd).then(() => showToast('Befehl kopiert', 'success', 1500)).catch(() => showToast('Kopieren fehlgeschlagen', 'error')); }

        loadUser();
        loadTrainers();
</script>

<!-- Support Widget -->
<div id="supportWidget" style="position:fixed; bottom:24px; right:24px; z-index:999;">
    <button id="supportToggle" onclick="toggleSupport()" style="width:56px; height:56px; border-radius:50%; background:var(--accent); color:var(--bg); border:none; font-size:1.4rem; cursor:pointer; box-shadow:0 8px 32px rgba(0,240,255,0.3); transition:transform .2s;"><i class="fas fa-comment-dots"></i></button>
    <div id="supportPanel" style="display:none; position:absolute; bottom:70px; right:0; width:320px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:0 16px 48px rgba(0,0,0,0.4);">
        <h4 style="margin:0 0 12px; font-family:'Rajdhani',sans-serif; text-transform:uppercase;">Support</h4>
        <div id="supportForm">
            <input type="email" id="supportEmail" placeholder="Deine E-Mail" style="margin-bottom:10px; width:100%;">
            <input type="text" id="supportSubject" placeholder="Betreff" style="margin-bottom:10px; width:100%;">
            <textarea id="supportMessage" placeholder="Wie können wir dir helfen?" rows="4" style="margin-bottom:10px; width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px;"></textarea>
            <button class="btn btn-primary" onclick="sendSupport()" style="width:100%;">Absenden</button>
        </div>
        <div id="supportSuccess" style="display:none; text-align:center; color:var(--success); padding:20px 0;">
            <i class="fas fa-check-circle" style="font-size:2rem;"></i>
            <p>Ticket erstellt. Wir melden uns per E-Mail.</p>
        </div>
    </div>
</div>

<script>
function toggleSupport() {
    const panel = document.getElementById('supportPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function sendSupport() {
    const btn = document.querySelector('#supportForm button');
    const email = document.getElementById('supportEmail').value.trim();
    const subject = document.getElementById('supportSubject').value.trim();
    const message = document.getElementById('supportMessage').value.trim();
    if (!email || !subject || !message) {
        if (typeof showToast === 'function') showToast('Bitte alle Felder ausfüllen', 'error');
        else alert('Bitte alle Felder ausfüllen');
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        const res = await fetch('api/support.php', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, subject, message})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('supportForm').style.display = 'none';
            document.getElementById('supportSuccess').style.display = 'block';
        } else {
            if (typeof showToast === 'function') showToast(data.error || 'Fehler', 'error');
            else alert(data.error || 'Fehler');
            btn.disabled = false;
            btn.textContent = 'Absenden';
        }
    } catch(e) {
        if (typeof showToast === 'function') showToast('Netzwerkfehler', 'error');
        else alert('Netzwerkfehler');
        btn.disabled = false;
    }
}

document.addEventListener('click', function(e) {
    const widget = document.getElementById('supportWidget');
    if (widget && !widget.contains(e.target)) {
        const panel = document.getElementById('supportPanel');
        if (panel) panel.style.display = 'none';
    }
});

</script>
</body>
</html>
